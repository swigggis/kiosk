# Nginx-Konfiguration für Schulkiosk BBS2 Celle
# Diese Datei nach /etc/nginx/sites-available/schulkiosk kopieren
# und mit: ln -s /etc/nginx/sites-available/schulkiosk /etc/nginx/sites-enabled/
# aktivieren

server {
    listen 80;
    server_name kiosk.swnetworks.de;

    # Optional: Redirect to HTTPS
    # return 301 https://$server_name$request_uri;

    # Logs
    access_log /var/log/nginx/schulkiosk_access.log;
    error_log /var/log/nginx/schulkiosk_error.log;

    # Proxy to Node.js backend
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Cache bypass
        proxy_cache_bypass $http_upgrade;
    }

    # Optional: Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}

